<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>TonyStory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e8f2fb; color: #1a2d3f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    #app { min-height: 100vh; }

    /* === Login Screen === */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    #login-screen h1 { font-size: 2.4rem; font-weight: 300; letter-spacing: 0.05em; color: #1a2d3f; }
    #login-screen p { color: #6b8faa; font-size: 0.95rem; }
    #btn-signin {
      background: #1a2d3f;
      color: #e8f2fb;
      border: none;
      border-radius: 4px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: opacity 0.15s;
    }
    #btn-signin:hover { opacity: 0.85; }
    #btn-signin svg { width: 20px; height: 20px; }
    .error-msg { color: #c0392b; font-size: 0.9rem; text-align: center; max-width: 360px; }

    /* === Loading === */
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid #c4d8ea;
      border-top-color: #3a7abd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { color: #6b8faa; font-size: 0.9rem; }

    /* === Header === */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(232,242,251,0.93);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #c4d8ea;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    #header-title { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.04em; color: #1a2d3f; }
    #header-meta { color: #6b8faa; font-size: 0.85rem; flex: 1; text-align: center; }
    #btn-signout {
      background: none;
      border: 1px solid #b0cce0;
      color: #6b8faa;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #btn-signout:hover { border-color: #3a7abd; color: #1a2d3f; }

    /* === Error banner === */
    #error-banner {
      background: #fde8e8;
      border-bottom: 1px solid #f0b8b8;
      color: #a02020;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
    }
    #error-banner a { color: #c0392b; cursor: pointer; text-decoration: underline; }

    /* === Timeline === */
    #timeline-screen {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px 80px 160px;
      position: relative;
    }
    /* Vertical rail line */
    #timeline-screen::before {
      content: '';
      position: absolute;
      left: 80px;
      top: 32px;
      bottom: 80px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, #b4cfe4 32px, #b4cfe4 calc(100% - 32px), transparent);
      pointer-events: none;
    }
    .month-bucket {
      position: relative;
      margin-bottom: 36px;
    }
    /* Dot on the rail */
    .month-bucket::before {
      content: '';
      position: absolute;
      left: -84px;
      top: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e8f2fb;
      border: 1.5px solid #3a7abd;
    }
    /* Connector from dot to content */
    .month-bucket::after {
      content: '';
      position: absolute;
      left: -76px;
      top: 11px;
      width: 72px;
      height: 1px;
      background: #c4d8ea;
    }
    .month-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
    }
    .month-label { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; color: #1a2d3f; }
    .month-count { color: #8aacbf; font-size: 0.8rem; }
    .month-age {
      display: block;
      font-size: 0.75rem;
      color: #8aacbf;
      margin-top: -6px;
      margin-bottom: 10px;
    }
    .milestone-badge {
      font-size: 0.72rem;
      background: #dbeeff;
      color: #1a4a7a;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .month-bucket.has-milestone::before {
      background: #3a7abd;
      border-color: #3a7abd;
    }
    /* Year label in the left gutter */
    .year-marker {
      position: absolute;
      left: -150px;
      top: 2px;
      width: 56px;
      text-align: right;
      font-size: 0.68rem;
      font-weight: 700;
      color: #3a7abd;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* === Masonry grid === */
    .photo-grid {
      columns: 6;
      column-gap: 5px;
    }
    .photo-item {
      break-inside: avoid;
      margin-bottom: 5px;
      cursor: pointer;
      overflow: hidden;
      border-radius: 4px;
      background: #c4d8ea;
    }
    .photo-item img {
      width: 100%;
      display: block;
      transition: filter 0.15s;
      -webkit-touch-callout: none;
      pointer-events: none;
    }
    .photo-item { -webkit-user-select: none; user-select: none; }
    .photo-item:hover img { filter: brightness(1.08); }
    .photo-item img.lazy { opacity: 0; transition: opacity 0.3s, filter 0.15s; }
    .photo-item img.loaded { opacity: 1; }

    /* === Collapsible months === */
    .month-header {
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .month-chevron {
      color: #8aacbf;
      font-size: 0.75em;
      margin-left: auto;
    }
    .photo-grid.collapsed {
      columns: 1;
      max-width: 200px;
      filter: grayscale(100%);
    }
    .month-bucket.current-month .photo-grid.collapsed {
      filter: none;
    }

    /* === Empty state === */
    #empty-state {
      text-align: center;
      padding: 80px 24px;
      color: #6b8faa;
    }
    #empty-state h2 { font-size: 1.4rem; font-weight: 400; margin-bottom: 8px; }

    /* === Sentinel === */
    #sentinel { height: 1px; }

    /* === Responsive === */
    @media (max-width: 1024px) { .photo-grid { columns: 4; } }
    @media (max-width: 768px) {
      .photo-grid { columns: 3; }
      #timeline-screen { padding-left: 80px; }
      #timeline-screen::before { left: 24px; }
      .month-bucket::before { left: -36px; }
      .month-bucket::after { left: -28px; width: 24px; }
      .year-marker { left: -72px; width: 44px; font-size: 0.6rem; }
    }
    @media (max-width: 480px) {
      .photo-grid { columns: 2; }
      #header-meta { display: none; }
      #timeline-screen { padding-left: 56px; }
      #timeline-screen::before { left: 16px; }
      .month-bucket::before { left: -28px; }
      .month-bucket::after { left: -20px; width: 16px; }
      .year-marker { display: none; }
    }

    /* === Lightbox === */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-backdrop {
      position: absolute;
      inset: 0;
      cursor: zoom-out;
    }
    #lightbox-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 90vw;
      max-height: 90vh;
      gap: 14px;
    }
    #lightbox-img {
      max-width: 90vw;
      max-height: 78vh;
      object-fit: contain;
      border-radius: 3px;
      display: block;
      -webkit-touch-callout: none;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #lightbox-info { text-align: center; }
    #lightbox-name { font-size: 0.95rem; font-weight: 500; }
    #lightbox-date { font-size: 0.8rem; color: #888; margin-top: 4px; }
    #lightbox-close {
      position: fixed;
      top: 20px; right: 24px;
      background: none; border: none;
      color: #fff; font-size: 1.8rem;
      cursor: pointer; line-height: 1;
      opacity: 0.7;
      z-index: 2;
    }
    #lightbox-close:hover { opacity: 1; }
    #lightbox-prev, #lightbox-next {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none; color: #fff;
      font-size: 1.6rem; padding: 14px 18px;
      cursor: pointer; border-radius: 4px;
      transition: background 0.15s;
      z-index: 2;
    }
    #lightbox-prev { left: 16px; }
    #lightbox-next { right: 16px; }
    #lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="lightbox" role="dialog" aria-modal="true">
    <div id="lightbox-backdrop"></div>
    <button id="lightbox-close" aria-label="Close">&#x2715;</button>
    <button id="lightbox-prev" aria-label="Previous">&#x2039;</button>
    <button id="lightbox-next" aria-label="Next">&#x203A;</button>
    <div id="lightbox-content">
      <img id="lightbox-img" src="" alt="" />
      <div id="lightbox-info">
        <div id="lightbox-name"></div>
        <div id="lightbox-date"></div>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const CONFIG = {
      CLIENT_ID: '815089123525-25qcg5ujrcug81e7ffi3f834ogqt3e2p.apps.googleusercontent.com',
      FOLDER_ID: '1MxTtKM4mZOzrWTz-x6dHgiEPV6efxrCR',
      SCOPES: 'https://www.googleapis.com/auth/drive.readonly'
    };

    const state = {
      token: null,
      photos: [],
      months: [],
      renderedMonths: 0,
      loading: false,
      error: null,
      config: null,  // { dob: Date, milestones: Map<string, string> } or null
      expandedMonths: new Set(),   // month labels currently expanded
      monthThumbnails: new Map()   // month label → random thumbnail index
    };

    // === Czech helpers ===

    function pluralCz(n, one, few, many) {
      if (n === 1) return `${n} ${one}`;
      if (n >= 2 && n <= 4) return `${n} ${few}`;
      return `${n} ${many}`;
    }

    function pluralCzFotek(n) {
      return pluralCz(n, 'fotka', 'fotky', 'fotek');
    }

    function formatAge(dob, today) {
      const totalDays = Math.floor((today - dob) / 86400000);
      if (totalDays < 0) return null;

      let years = today.getFullYear() - dob.getFullYear();
      let months = today.getMonth() - dob.getMonth();
      if (today.getDate() < dob.getDate()) months--;
      if (months < 0) { years--; months += 12; }

      if (today.getDate() === dob.getDate() && today.getMonth() === dob.getMonth() && years > 0) {
        return `Tonymu je dnes ${pluralCz(years, 'rok', 'roky', 'let')}!`;
      }
      if (totalDays < 30) return 'Tonymu je méně než měsíc';
      if (years === 0) return `Tonymu je ${pluralCz(months, 'měsíc', 'měsíce', 'měsíců')}`;
      if (months === 0) return `Tonymu je ${pluralCz(years, 'rok', 'roky', 'let')}`;
      return `Tonymu je ${pluralCz(years, 'rok', 'roky', 'let')} a ${pluralCz(months, 'měsíc', 'měsíce', 'měsíců')}`;
    }

    function formatMonthAge(bucketYear, bucketMonth, dob) {
      const ageMonths = (bucketYear - dob.getFullYear()) * 12 + (bucketMonth - dob.getMonth());
      if (ageMonths < 0) return null;
      if (ageMonths === 0) return 'novorozenec';
      const years = Math.floor(ageMonths / 12);
      const months = ageMonths % 12;
      if (years === 0) return pluralCz(months, 'měsíc', 'měsíce', 'měsíců');
      if (months === 0) return pluralCz(years, 'rok', 'roky', 'let');
      return `${pluralCz(years, 'rok', 'roky', 'let')} a ${pluralCz(months, 'měsíc', 'měsíce', 'měsíců')}`;
    }

    // === Render ===

    function render() {
      const app = document.getElementById('app');
      if (!state.token) {
        app.innerHTML = `
          <div id="login-screen">
            <h1>TonyStory</h1>
            <p>Jak Tony roste, měsíc po měsíci</p>
            <button id="btn-signin">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Přihlásit se přes Google
            </button>
            ${state.error ? `<p class="error-msg">${state.error}</p>` : ''}
          </div>`;
        document.getElementById('btn-signin').addEventListener('click', startAuth);
      } else if (state.loading) {
        app.innerHTML = `
          <div id="loading-screen">
            <div class="spinner"></div>
            <p id="loading-msg">Načítám fotky…</p>
          </div>`;
      } else {
        app.innerHTML = buildHeader() + `<div id="timeline-screen">${buildTimeline()}</div>`;
        document.getElementById('btn-signout').addEventListener('click', signOut);
        const retryBtn = document.getElementById('btn-retry-signout');
        if (retryBtn) retryBtn.addEventListener('click', signOut);
        if (state.months.length > 0) {
          appendNextMonths();
          initSentinelObserver();
          initMonthClickDelegation();
        }
      }
    }

    // === Header ===

    function buildHeader() {
      const total = state.photos.length;
      let meta = '';
      if (state.config && state.config.dob) {
        const ageStr = formatAge(state.config.dob, new Date());
        if (ageStr) {
          meta = total > 0 ? `${ageStr} · ${pluralCzFotek(total)}` : ageStr;
        } else if (total > 0) {
          meta = pluralCzFotek(total);
        }
      } else if (total > 0) {
        const oldest = state.photos[state.photos.length - 1].date;
        const newest = state.photos[0].date;
        const fmt = d => d.toLocaleString('cs-CZ', { month: 'short', year: 'numeric' });
        meta = `${pluralCzFotek(total)} · ${fmt(oldest)} – ${fmt(newest)}`;
      }
      const banner = state.error ? `
        <div id="error-banner">
          <span>${escapeHtml(state.error)}</span>
          <a id="btn-retry-signout">Odhlásit se a zkusit znovu</a>
        </div>` : '';
      return `
        <header id="site-header">
          <span id="header-title">TonyStory</span>
          <span id="header-meta">${meta}</span>
          <button id="btn-signout">Odhlásit se</button>
        </header>
        ${banner}`;
    }

    // === Auth ===

    let tokenClient;

    function initAuth() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: (response) => {
          if (response.error) {
            state.error = 'Sign-in failed: ' + response.error;
            render();
            return;
          }
          state.token = response.access_token;
          state.error = null;
          sessionStorage.setItem('gd_token', response.access_token);
          render();
          loadConfig().then(() => loadPhotos());
        }
      });
    }

    function startAuth() {
      tokenClient.requestAccessToken();
    }

    function signOut() {
      google.accounts.oauth2.revoke(state.token, () => {});
      state.token = null;
      state.photos = [];
      state.months = [];
      state.renderedMonths = 0;
      sessionStorage.removeItem('gd_token');
      render();
    }

    // === Drive API ===

    async function loadPhotos() {
      state.loading = true;
      state.photos = [];
      state.error = null;
      render();

      try {
        let pageToken = null;
        let fetched = 0;
        do {
          const params = new URLSearchParams({
            q: `'${CONFIG.FOLDER_ID}' in parents and trashed=false and mimeType contains 'image/'`,
            fields: 'nextPageToken,files(id,name,mimeType,createdTime,imageMediaMetadata,thumbnailLink)',
            pageSize: '100',
            ...(pageToken ? { pageToken } : {})
          });

          const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
            headers: { Authorization: `Bearer ${state.token}` }
          });

          if (res.status === 401) {
            handleAuthError();
            return;
          }
          if (!res.ok) {
            throw new Error(`Drive API error: ${res.status}`);
          }

          const data = await res.json();
          const photos = (data.files || []).map(f => ({
            id: f.id,
            name: f.name,
            date: parsePhotoDate(f),
            thumbnailUrl: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s200') : null,
            fullUrl: `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`
          }));

          state.photos.push(...photos);
          fetched += photos.length;

          const msg = document.getElementById('loading-msg');
          if (msg) msg.textContent = `Načítám fotky… (nalezeno ${fetched})`;

          pageToken = data.nextPageToken;
        } while (pageToken);

        state.photos.sort((a, b) => b.date - a.date);
        state.months = groupByMonth(state.photos);
        state.renderedMonths = 0;
        state.loading = false;
        render();

      } catch (err) {
        state.loading = false;
        state.error = err.message;
        render();
      }
    }

    function parsePhotoDate(file) {
      if (file.imageMediaMetadata && file.imageMediaMetadata.time) {
        const d = new Date(file.imageMediaMetadata.time);
        if (!isNaN(d)) return d;
      }
      return new Date(file.createdTime);
    }

    function groupByMonth(photos) {
      const map = new Map();
      for (const photo of photos) {
        const label = photo.date.toLocaleString('en-US', { month: 'long', year: 'numeric' });
        if (!map.has(label)) {
          map.set(label, {
            photos: [],
            czechMonth: photo.date.toLocaleString('cs-CZ', { month: 'long' }),
            year: photo.date.getFullYear(),
            month: photo.date.getMonth()
          });
        }
        map.get(label).photos.push(photo);
      }
      return Array.from(map.entries()).map(([label, data]) => ({
        label,
        czechMonth: data.czechMonth,
        year: data.year,
        month: data.month,
        photos: data.photos
      }));
    }

    function handleAuthError() {
      state.token = null;
      state.loading = false;
      state.error = 'Relace vypršela. Přihlas se znovu.';
      sessionStorage.removeItem('gd_token');
      render();
    }

    // === Config ===

    async function loadConfig() {
      try {
        const params = new URLSearchParams({
          q: `name = 'tonystory-config.json' and '${CONFIG.FOLDER_ID}' in parents and trashed=false`,
          fields: 'files(id)',
          pageSize: '1'
        });
        const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
          headers: { Authorization: `Bearer ${state.token}` }
        });
        if (!res.ok) return;
        const data = await res.json();
        if (!data.files || data.files.length === 0) return;
        const fileId = data.files[0].id;
        const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
          headers: { Authorization: `Bearer ${state.token}` }
        });
        if (!fileRes.ok) return;
        const json = await fileRes.json();
        if (!json.dob) return;
        const dob = new Date(json.dob);
        if (isNaN(dob.getTime())) return;
        state.config = {
          dob,
          milestones: new Map((json.milestones || []).map(m => [m.month, m.label]))
        };
      } catch {
        // config is optional — silently skip on any error
      }
    }

    // === Timeline ===

    const MONTHS_PER_BATCH = 3;

    function buildTimeline() {
      if (state.months.length === 0) {
        return `<div id="empty-state">
          <h2>V této složce nejsou žádné fotky</h2>
          <p>Zkontroluj FOLDER_ID v konfiguraci.</p>
        </div>`;
      }
      return `<div id="months-container"></div><div id="sentinel"></div>`;
    }

    function renderMonthBucket(month, isYearStart, monthIndex) {
      if (!month.photos.length) return '';
      const yearMarker = isYearStart ? `<div class="year-marker">${month.year}</div>` : '';

      // Age label below month name
      let ageLabel = '';
      if (state.config && state.config.dob) {
        const age = formatMonthAge(month.year, month.month, state.config.dob);
        if (age) ageLabel = `<span class="month-age">${age}</span>`;
      }

      // Milestone badge
      const milestoneText = state.config && state.config.milestones.has(month.label)
        ? state.config.milestones.get(month.label)
        : null;
      const milestoneBadge = milestoneText
        ? `<span class="milestone-badge">${escapeHtml(milestoneText)}</span>`
        : '';

      // Pick random thumbnail index once per month
      if (!state.monthThumbnails.has(month.label)) {
        state.monthThumbnails.set(month.label, Math.floor(Math.random() * month.photos.length));
      }
      const thumbIdx = state.monthThumbnails.get(month.label);

      const isExpanded = state.expandedMonths.has(month.label);
      // monthIndex === 0 is always the most recent month (state.months is sorted newest-first)
      // and is always rendered in the first batch, so this is a stable check
      const isMostRecent = monthIndex === 0;
      const chevron = isExpanded ? '▾' : '▸';

      let gridHtml;
      if (isExpanded) {
        const items = month.photos.map((photo, idx) => `
          <div class="photo-item" data-photo-id="${photo.id}" data-month-label="${month.label}" data-month-idx="${idx}">
            <img
              class="lazy"
              data-src="${photo.thumbnailUrl}"
              alt="${escapeHtml(photo.name)}"
              loading="lazy"
            />
          </div>`).join('');
        gridHtml = `<div class="photo-grid">${items}</div>`;
      } else {
        const photo = month.photos[thumbIdx];
        gridHtml = `
          <div class="photo-grid collapsed">
            <div class="photo-item" data-photo-id="${photo.id}" data-month-label="${month.label}" data-month-idx="${thumbIdx}">
              <img
                ${photo.thumbnailUrl ? `src="${photo.thumbnailUrl}"` : ''}
                alt="${escapeHtml(photo.name)}"
                class="loaded"
              />
            </div>
          </div>`;
      }

      return `
        <div class="month-bucket${milestoneText ? ' has-milestone' : ''}${isMostRecent ? ' current-month' : ''}" data-month="${month.label}">
          ${yearMarker}
          <div class="month-header">
            <span class="month-label">${escapeHtml(month.czechMonth)}</span>
            ${milestoneBadge}
            <span class="month-count">${pluralCzFotek(month.photos.length)}</span>
            <span class="month-chevron">${chevron}</span>
          </div>
          ${ageLabel}
          ${gridHtml}
        </div>`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function appendNextMonths() {
      const container = document.getElementById('months-container');
      if (!container) return;
      const end = Math.min(state.renderedMonths + MONTHS_PER_BATCH, state.months.length);
      for (let i = state.renderedMonths; i < end; i++) {
        const month = state.months[i];
        const prevYear = i > 0 ? state.months[i - 1].year : null;
        const isYearStart = i === 0 || month.year !== prevYear;
        container.insertAdjacentHTML('beforeend', renderMonthBucket(month, isYearStart, i));
      }
      state.renderedMonths = end;
      attachImageObserver();
      attachPhotoClickHandlers();
    }

    function toggleMonth(label) {
      const bucket = document.querySelector(`.month-bucket[data-month="${label}"]`);
      if (!bucket) return;
      const monthIndex = state.months.findIndex(m => m.label === label);
      if (monthIndex === -1) return;
      if (state.expandedMonths.has(label)) {
        state.expandedMonths.delete(label);
      } else {
        state.expandedMonths.add(label);
      }
      const prevYear = monthIndex > 0 ? state.months[monthIndex - 1].year : null;
      const isYearStart = monthIndex === 0 || state.months[monthIndex].year !== prevYear;
      bucket.outerHTML = renderMonthBucket(state.months[monthIndex], isYearStart, monthIndex);
      if (state.expandedMonths.has(label)) {
        attachImageObserver();
        attachPhotoClickHandlers();
      }
    }

    function initMonthClickDelegation() {
      const container = document.getElementById('months-container');
      if (!container || container.dataset.monthClickAttached) return;
      container.dataset.monthClickAttached = 'true';
      container.addEventListener('click', (e) => {
        const header = e.target.closest('.month-header');
        if (!header) return;
        const bucket = header.closest('.month-bucket');
        if (!bucket) return;
        const label = bucket.dataset.month;
        if (label) toggleMonth(label);
      });
    }

    function initSentinelObserver() {
      const sentinel = document.getElementById('sentinel');
      if (!sentinel) return;
      const obs = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && state.renderedMonths < state.months.length) {
          appendNextMonths();
        }
      }, { rootMargin: '200px' });
      obs.observe(sentinel);
    }

    function attachPhotoClickHandlers() {
      document.querySelectorAll('.photo-item').forEach(item => {
        if (item.dataset.listenerAttached) return;
        item.dataset.listenerAttached = 'true';
        item.addEventListener('click', () => {
          const photoId = item.dataset.photoId;
          const monthLabel = item.dataset.monthLabel;
          const monthIdx = parseInt(item.dataset.monthIdx, 10);
          openLightbox(photoId, monthLabel, monthIdx);
        });
      });
    }

    // === Lazy image loading ===

    let imageObserver;

    function attachImageObserver() {
      if (!imageObserver) {
        imageObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              if (img.dataset.src) {
                img.src = img.dataset.src;
                img.removeAttribute('data-src');
                img.addEventListener('load', () => img.classList.add('loaded'), { once: true });
                img.addEventListener('error', async () => {
                  const photoId = img.closest('.photo-item')?.dataset.photoId;
                  if (photoId) {
                    try {
                      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${photoId}?alt=media`, {
                        headers: { Authorization: `Bearer ${state.token}` }
                      });
                      if (res.ok) {
                        img.src = URL.createObjectURL(await res.blob());
                        img.classList.add('loaded');
                        return;
                      }
                    } catch {}
                  }
                  img.classList.add('loaded');
                  img.style.minHeight = '120px';
                  img.style.background = '#1e1e1e';
                }, { once: true });
                imageObserver.unobserve(img);
              }
            }
          });
        }, { rootMargin: '300px' });
      }

      document.querySelectorAll('img.lazy[data-src]').forEach(img => {
        if (img.dataset.src) imageObserver.observe(img);
      });
    }

    // === Lightbox ===

    let lightboxMonthPhotos = [];
    let lightboxCurrentIdx = 0;

    function openLightbox(photoId, monthLabel, monthIdx) {
      const month = state.months.find(m => m.label === monthLabel);
      if (!month) return;
      lightboxMonthPhotos = month.photos;
      lightboxCurrentIdx = monthIdx;
      showLightboxPhoto(monthIdx);
      document.getElementById('lightbox').classList.add('open');
      document.addEventListener('keydown', lightboxKeyHandler);
    }

    async function showLightboxPhoto(idx) {
      const photo = lightboxMonthPhotos[idx];
      if (!photo) return;
      lightboxCurrentIdx = idx;
      const img = document.getElementById('lightbox-img');
      img.src = '';
      img.alt = photo.name;
      try {
        const res = await fetch(photo.fullUrl, { headers: { Authorization: `Bearer ${state.token}` } });
        if (!res.ok) throw new Error('load failed');
        const blob = await res.blob();
        img.src = URL.createObjectURL(blob);
      } catch {
        img.src = photo.thumbnailUrl || '';
      }
      document.getElementById('lightbox-name').textContent = photo.name;
      document.getElementById('lightbox-date').textContent =
        photo.date.toLocaleString('cs-CZ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('lightbox-prev').style.visibility = idx > 0 ? 'visible' : 'hidden';
      document.getElementById('lightbox-next').style.visibility = idx < lightboxMonthPhotos.length - 1 ? 'visible' : 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightbox-img').src = '';
      document.removeEventListener('keydown', lightboxKeyHandler);
    }

    function lightboxKeyHandler(e) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft' && lightboxCurrentIdx > 0) showLightboxPhoto(lightboxCurrentIdx - 1);
      if (e.key === 'ArrowRight' && lightboxCurrentIdx < lightboxMonthPhotos.length - 1) showLightboxPhoto(lightboxCurrentIdx + 1);
    }

    // === Init ===

    window.addEventListener('load', () => {
      const savedToken = sessionStorage.getItem('gd_token');
      if (savedToken) {
        state.token = savedToken;
      }

      // Wait for GSI library to load then init auth
      const waitForGSI = setInterval(() => {
        if (window.google && google.accounts) {
          clearInterval(waitForGSI);
          initAuth();
          render();
          if (state.token) loadConfig().then(() => loadPhotos());
        }
      }, 100);

      document.getElementById('lightbox-backdrop').addEventListener('click', closeLightbox);
      document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
      document.getElementById('lightbox-prev').addEventListener('click', () => {
        if (lightboxCurrentIdx > 0) showLightboxPhoto(lightboxCurrentIdx - 1);
      });
      document.getElementById('lightbox-next').addEventListener('click', () => {
        if (lightboxCurrentIdx < lightboxMonthPhotos.length - 1) showLightboxPhoto(lightboxCurrentIdx + 1);
      });
    });
  </script>
</body>
</html>
